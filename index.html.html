document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eight=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><\u002Fsvg>\n        <span>Dashboard<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goTasks }}\" style=\"{{ navMTasks }}\">\n        <div style=\"position:relative;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 3h6a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z\"><\u002Fpath><path d=\"M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2\"><\u002Fpath><path d=\"m9 14 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n          <span style=\"position:absolute;top:-6px;right:-10px;background:#366998;color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;padding:0 4px;border-radius:10px;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan>\n        <\u002Fdiv>\n        <span>Tasks<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goMessages }}\" style=\"{{ navMMessages }}\">\n        <div style=\"position:relative;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg>\n          <span style=\"position:absolute;top:-6px;right:-10px;background:#ff8500;color:#fff;font-size:9px;font-weight:700;min-width:15px;height:15px;padding:0 4px;border-radius:10px;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan>\n        <\u002Fdiv>\n        <span>Messages<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goReports }}\" style=\"{{ navMReports }}\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"6\" y1=\"20\" x2=\"6\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"6\"><\u002Fline><line x1=\"18\" y1=\"20\" x2=\"18\" y2=\"10\"><\u002Fline><\u002Fsvg>\n        <span>Reports<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goSettings }}\" style=\"{{ navMSettings }}\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><circle cx=\"9\" cy=\"7\" r=\"2.4\" fill=\"#fff\"><\u002Fcircle><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><circle cx=\"15\" cy=\"17\" r=\"2.4\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n        <span>Settings<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fnav>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen: 'dashboard', channel: 'general', taskTab: 'All', mobileChat: false, vw: (typeof window !== 'undefined' ? window.innerWidth : 1200) };\n\n  componentDidMount() {\n    this._onResize = () => this.setState({ vw: window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  renderVals() {\n    const s = this.state, screen = s.screen;\n    const isMobile = (s.vw || 1200) < 760;\n    const notMobile = !isMobile;\n\n    const nav = (k) => `display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:10px;cursor:pointer;font-size:15px;letter-spacing:.2px;transition:background .15s,color .15s;${screen === k ? 'background:#eef3f8;color:#366998;font-weight:600;' : 'background:transparent;color:#5b6573;font-weight:500;'}`;\n    const navM = (k) => `display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex:1;padding:9px 0 8px;cursor:pointer;font-size:10.5px;font-weight:500;color:${screen === k ? '#366998' : '#8b94a1'};`;\n    const pill = (c, b) => `display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:30px;font-size:12.5px;font-weight:600;color:${c};background:${b};white-space:nowrap;`;\n    const av = (color, sz) => `width:${sz}px;height:${sz}px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:${sz < 32 ? 11.5 : 12.5}px;font-weight:600;flex:none;`;\n    const stackAv = (color) => `width:30px;height:30px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none;border:2px solid #fff;margin-left:-9px;`;\n    const dot = (st) => `width:9px;height:9px;border-radius:50%;flex:none;background:${st === 'online' ? '#2f9e6f' : st === 'away' ? '#d9a000' : '#b6bdc7'};`;\n\n    const PRI = { High: ['#d4373d', '#fdeced'], Medium: ['#b07d00', '#fbf2db'], Low: ['#2f8f63', '#e7f5ec'] };\n    const STA = { 'In Review': ['#366998', '#e9f1f8'], 'Pending': ['#b07d00', '#fbf2db'], 'Approved': ['#2f8f63', '#e7f5ec'], 'Rejected': ['#d4373d', '#fdeced'] };\n    const ROLE = { Admin: ['#7a5ea8', '#f1edf8'], Manager: ['#366998', '#e9f1f8'], Staff: ['#4a5462', '#eef1f4'] };\n\n    // Responsive layout tokens\n    const pageWrap = isMobile ? 'padding:18px 16px 28px;max-width:100%;' : 'padding:34px 42px 56px;max-width:1200px;';\n    const h1Style = `font-size:${isMobile ? 21 : 27}px;font-weight:600;color:#1d2733;letter-spacing:-.3px;`;\n    const subStyle = `font-size:${isMobile ? 13 : 14.5}px;color:#8b94a1;margin-top:5px;`;\n    const headerRow = `display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:${isMobile ? 20 : 26}px;flex-wrap:wrap;`;\n    const statGrid = `display:grid;grid-template-columns:repeat(${isMobile ? 2 : 4},1fr);gap:${isMobile ? 12 : 18}px;margin-bottom:${isMobile ? 22 : 30}px;`;\n    const metricsGrid = `display:grid;grid-template-columns:repeat(${isMobile ? 2 : 4},1fr);gap:${isMobile ? 12 : 18}px;margin-bottom:18px;`;\n    const projGrid = `display:grid;grid-template-columns:${isMobile ? '1fr' : 'repeat(3,1fr)'};gap:${isMobile ? 14 : 18}px;margin-bottom:34px;`;\n    const dashSplit = `display:grid;grid-template-columns:${isMobile ? '1fr' : '1.7fr 1fr'};gap:18px;`;\n    const reportSplit = `display:grid;grid-template-columns:${isMobile ? '1fr' : '1.4fr 1fr'};gap:18px;margin-bottom:18px;`;\n    const contribGrid = `display:grid;grid-template-columns:${isMobile ? '1fr' : 'repeat(3,1fr)'};gap:16px;`;\n    const roleGrid = `display:grid;grid-template-columns:${isMobile ? '1fr' : 'repeat(3,1fr)'};gap:${isMobile ? 12 : 18}px;margin-bottom:24px;`;\n\n    const titles = { dashboard: 'Dashboard', tasks: 'Tasks', messages: 'Messages', reports: 'Reports', settings: 'Settings' };\n\n    const members = [\n      { name: 'Edna Okafor', first: 'Edna', initials: 'EO', role: 'Manager', color: '#366998', status: 'online', email: 'edna.okafor@hronwheels.com' },\n      { name: 'Babajide Adeyemi', first: 'Babajide', initials: 'BA', role: 'Admin', color: '#7a5ea8', status: 'online', email: 'babajide.adeyemi@hronwheels.com' },\n      { name: 'Chioma Nwosu', first: 'Chioma', initials: 'CN', role: 'Staff', color: '#2f8f8a', status: 'online', email: 'chioma.nwosu@hronwheels.com' },\n      { name: 'Tunde Bello', first: 'Tunde', initials: 'TB', role: 'Staff', color: '#c77d3a', status: 'online', email: 'tunde.bello@hronwheels.com' },\n      { name: 'Aisha Bello', first: 'Aisha', initials: 'AB', role: 'Staff', color: '#b0567a', status: 'online', email: 'aisha.bello@hronwheels.com' },\n      { name: 'Kwame Mensah', first: 'Kwame', initials: 'KM', role: 'Manager', color: '#4a8f5e', status: 'offline', email: 'kwame.mensah@hronwheels.com' }\n    ];\n    const byFirst = {};\n    members.forEach(m => {\n      m.avStyle = av(m.color, 34);\n      m.dotStyle = dot(m.status);\n      m.roleStyle = pill(...ROLE[m.role]);\n      byFirst[m.first] = m;\n    });\n\n    const tasksRaw = [\n      { title: 'Review Q2 onboarding paperwork', assignee: 'Babajide', priority: 'High', status: 'In Review', due: 'Today', project: 'Onboarding Revamp' },\n      { title: 'Approve June payroll batch', assignee: 'Edna', priority: 'High', status: 'Pending', due: 'Today', project: 'Payroll Migration' },\n      { title: 'Update staff handbook v3', assignee: 'Chioma', priority: 'Medium', status: 'In Review', due: 'Jun 20', project: 'Onboarding Revamp' },\n      { title: 'Draft new leave policy', assignee: 'Edna', priority: 'Low', status: 'Pending', due: 'Jun 24', project: 'Policy & Compliance' },\n      { title: 'Finalise Q3 training deck', assignee: 'Aisha', priority: 'Medium', status: 'Approved', due: 'Jun 19', project: 'Staff Training Q3' },\n      { title: 'Service fleet vehicles', assignee: 'Tunde', priority: 'Low', status: 'Approved', due: 'Jun 18', project: 'Field Operations' }\n    ];\n    const tasks = tasksRaw.map(t => {\n      const m = byFirst[t.assignee] || { initials: '?', color: '#5a6472' };\n      return { ...t, priStyle: pill(...PRI[t.priority]), staStyle: pill(...STA[t.status]), staStyleHide: pill(...STA[t.status]) + (isMobile ? 'display:none;' : ''), aInit: m.initials, aStyle: av(m.color, 34), aStyleSm: av(m.color, 30) };\n    });\n    const activeTasks = tasks.filter(t => t.status !== 'Approved');\n    const pendingApprovals = tasks.filter(t => t.status === 'In Review');\n\n    const tabBase = (active) => `padding:8px 16px;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;${active ? 'background:#366998;color:#fff;' : 'background:#fff;color:#6b7480;border:1px solid #e3e7ec;'}`;\n    const tabs = ['All', 'In Review', 'Pending', 'Approved'];\n    const taskTabs = tabs.map(label => ({ label, style: tabBase(s.taskTab === label), onClick: () => this.setState({ taskTab: label }) }));\n    const filteredTasks = s.taskTab === 'All' ? tasks : tasks.filter(t => t.status === s.taskTab);\n\n    const projTeam = [['BA', 'CN', 'AB'], ['EO', 'TB', 'KM'], ['AB', 'EO', 'CN']];\n    const projectsRaw = [\n      { name: 'Onboarding Revamp', pct: 68, tasks: 8, due: 'Jun 30', health: 'On track' },\n      { name: 'Payroll Migration', pct: 42, tasks: 12, due: 'Jul 15', health: 'On track' },\n      { name: 'Staff Training Q3', pct: 25, tasks: 5, due: 'Aug 1', health: 'At risk' }\n    ];\n    const initColor = (init) => (members.find(m => m.initials === init) || {}).color || '#5a6472';\n    const projects = projectsRaw.map((p, i) => ({\n      ...p,\n      barStyle: `width:${p.pct}%;height:100%;background:#366998;border-radius:6px;`,\n      healthStyle: p.health === 'At risk' ? pill('#b07d00', '#fbf2db') : pill('#2f8f63', '#e7f5ec'),\n      avatars: projTeam[i].map(init => ({ init, style: stackAv(initColor(init)) }))\n    }));\n\n    const onlineMembers = members.filter(m => m.status === 'online');\n\n    // Messaging\n    const chMeta = {\n      general: { sub: '6 members · 5 online' },\n      operations: { sub: '4 members · 3 online' },\n      onboarding: { sub: '3 members · 2 online' },\n      babajide: { sub: 'Admin · online' },\n      chioma: { sub: 'Staff · online' }\n    };\n    const channelsRaw = [\n      { id: 'general', name: 'Team General', icon: 'TG', color: '#366998', last: 'Aisha: Training deck is ready', time: '9:42', unread: 3 },\n      { id: 'operations', name: 'Field Operations', icon: 'FO', color: '#c77d3a', last: 'Tunde: Vans serviced for the week', time: '8:15', unread: 0 },\n      { id: 'onboarding', name: 'Onboarding Squad', icon: 'OS', color: '#2f8f8a', last: 'You: Sent the offer letter', time: 'Yest', unread: 0 },\n      { id: 'babajide', name: 'Babajide Adeyemi', icon: 'BA', color: '#7a5ea8', last: 'Approved the payroll batch', time: 'Yest', unread: 1 },\n      { id: 'chioma', name: 'Chioma Nwosu', icon: 'CN', color: '#b0567a', last: 'Thanks Edna, much appreciated', time: 'Mon', unread: 0 }\n    ];\n    const channels = channelsRaw.map(c => ({\n      ...c,\n      onClick: () => this.setState({ channel: c.id, mobileChat: true }),\n      itemStyle: `display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;margin-bottom:2px;${s.channel === c.id && notMobile ? 'background:#eef3f8;' : ''}`,\n      avStyle: av(c.color, 42),\n      badgeStyle: c.unread > 0 ? 'background:#ff8500;color:#fff;font-size:11px;font-weight:600;min-width:19px;height:19px;padding:0 6px;border-radius:20px;display:flex;align-items:center;justify-content:center;flex:none;' : 'display:none;'\n    }));\n    const currentChannelRaw = channelsRaw.find(c => c.id === s.channel) || channelsRaw[0];\n    const currentChannel = { ...currentChannelRaw, avStyle: av(currentChannelRaw.color, 40), sub: (chMeta[s.channel] || {}).sub || '' };\n\n    const convos = {\n      general: [\n        { from: 'Babajide', text: 'Morning team — the June payroll batch is ready for review.', time: '9:10', me: false },\n        { from: 'Edna', text: 'Great work. I will approve it before lunch.', time: '9:14', me: true },\n        { from: 'Aisha', text: 'The Q3 training deck is finalised and uploaded to the drive.', time: '9:38', me: false },\n        { from: 'Aisha', text: 'Let me know if anything needs changing before Friday.', time: '9:38', me: false },\n        { from: 'Edna', text: 'Looks solid, Aisha. Nice turnaround.', time: '9:42', me: true }\n      ],\n      operations: [\n        { from: 'Tunde', text: 'All five vans have been serviced and inspected for the week.', time: '8:02', me: false },\n        { from: 'Edna', text: 'Perfect. Any issues flagged on the inspection?', time: '8:10', me: true },\n        { from: 'Tunde', text: 'Just routine tyre rotation. All good to go.', time: '8:15', me: false }\n      ],\n      onboarding: [\n        { from: 'Chioma', text: 'New hire starts Monday — paperwork is in progress.', time: 'Yest', me: false },\n        { from: 'Edna', text: 'Sent the offer letter just now. Welcome packet next.', time: 'Yest', me: true }\n      ],\n      babajide: [\n        { from: 'Babajide', text: 'Approved the payroll batch on my end.', time: 'Yest', me: false },\n        { from: 'Edna', text: 'Thanks Babajide, confirming now.', time: 'Yest', me: true }\n      ],\n      chioma: [\n        { from: 'Edna', text: 'Handbook update looks great, Chioma.', time: 'Mon', me: true },\n        { from: 'Chioma', text: 'Thanks Edna, much appreciated.', time: 'Mon', me: false }\n      ]\n    };\n    const messages = (convos[s.channel] || convos.general).map(m => {\n      const mm = byFirst[m.from] || { initials: '?', color: '#5a6472' };\n      return {\n        ...m,\n        showMeta: !m.me,\n        rowStyle: `display:flex;gap:9px;align-items:flex-start;${m.me ? 'justify-content:flex-end;' : 'justify-content:flex-start;'}`,\n        aStyle: av(mm.color, 30),\n        aInit: mm.initials,\n        bubbleStyle: m.me\n          ? 'background:#366998;color:#fff;padding:10px 14px;border-radius:14px 4px 14px 14px;font-size:14px;line-height:1.5;'\n          : 'background:#fff;color:#1d2733;border:1px solid #eef0f3;padding:10px 14px;border-radius:4px 14px 14px 14px;font-size:14px;line-height:1.5;',\n        timeStyle: `font-size:11px;color:#a4abb6;margin-top:4px;${m.me ? 'text-align:right;' : ''}`\n      };\n    });\n    const showChannelList = notMobile || !s.mobileChat;\n    const showChat = notMobile || s.mobileChat;\n    const chListStyle = notMobile\n      ? 'width:332px;flex:none;border-right:1px solid #edf0f3;display:flex;flex-direction:column;'\n      : 'width:100%;flex:1;display:flex;flex-direction:column;';\n    const chatPaneStyle = 'flex:1;display:flex;flex-direction:column;min-width:0;';\n\n    // Reports\n    const metricsRaw = [\n      { label: 'Tasks completed', value: '23', delta: '+12%', up: true },\n      { label: 'Tasks created', value: '31', delta: '+8%', up: true },\n      { label: 'Approval rate', value: '94%', delta: '+3%', up: true },\n      { label: 'Avg. completion', value: '1.8d', delta: '-0.4d', up: true }\n    ];\n    const metrics = metricsRaw.map(m => ({ ...m, deltaStyle: `font-size:12.5px;font-weight:600;margin-top:8px;color:${m.up ? '#2f8f63' : '#d4373d'};` }));\n\n    const barData = [{ day: 'Mon', value: 4 }, { day: 'Tue', value: 6 }, { day: 'Wed', value: 3 }, { day: 'Thu', value: 7 }, { day: 'Fri', value: 3 }];\n    const maxBar = 8;\n    const bars = barData.map(b => ({ ...b, barStyle: `width:100%;border-radius:7px 7px 4px 4px;background:#366998;height:${Math.round((b.value / maxBar) * 100)}%;min-height:8px;` }));\n\n    const reportProjects = [\n      { name: 'Onboarding Revamp', pct: 68, delta: '+14%' },\n      { name: 'Payroll Migration', pct: 42, delta: '+9%' },\n      { name: 'Staff Training Q3', pct: 25, delta: '+5%' }\n    ].map(p => ({ ...p, barStyle: `width:${p.pct}%;height:100%;background:#366998;border-radius:6px;` }));\n\n    const contributors = [\n      { name: 'Aisha Bello', role: 'Staff', tasks: 9 },\n      { name: 'Babajide Adeyemi', role: 'Admin', tasks: 7 },\n      { name: 'Chioma Nwosu', role: 'Staff', tasks: 6 }\n    ].map(c => {\n      const mm = members.find(m => m.name === c.name) || { color: '#5a6472', initials: '?' };\n      return { ...c, avStyle: av(mm.color, 38), initials: mm.initials };\n    });\n\n    // Settings\n    const roleCards = [\n      { name: 'Admin', count: 1, desc: 'Full system access. Manages users, roles and all settings.' },\n      { name: 'Manager', count: 2, desc: 'Creates and assigns tasks, approves workflows, views reports.' },\n      { name: 'Staff', count: 3, desc: 'Executes assigned tasks, messages the team and views reports.' }\n    ].map(r => ({ ...r, tagStyle: pill(...ROLE[r.name]) }));\n\n    const yes = 'color:#366998;font-weight:700;font-size:17px;'
