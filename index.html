document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"81cfb95c-eda5-4484-a493-c5d572405d87\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https:\u002F\u002Ffonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https:\u002F\u002Ffonts.gstatic.com\" crossorigin=\"\">\n<style>\u002F* vietnamese *\u002F\n@font-face {\n  font-family: 'Questrial';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"514e3b0f-662a-4ece-af02-9429ac0e2562\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n\u002F* latin-ext *\u002F\n@font-face {\n  font-family: 'Questrial';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"60a0b3d7-98b9-4164-a1fd-7551bb90c52b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\u002F* latin *\u002F\n@font-face {\n  font-family: 'Questrial';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"18b4030c-1206-4477-bdd4-c52ae575211c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; padding: 0; }\n  body { font-family: 'Questrial', 'Century Gothic', sans-serif; background: #e8ebef; color: #16202b; letter-spacing: .1px; }\n  ::-webkit-scrollbar { width: 0; height: 0; }\n  @keyframes ih-screen { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes ih-sheet { from { transform: translateY(100%); } to { transform: translateY(0); } }\n  @keyframes ih-fade { from { opacity: 0; } to { opacity: 1; } }\n  @keyframes ih-pop { from { opacity: 0; transform: scale(.94) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }\n  .ih-stat-card { cursor: pointer; transition: transform .12s ease, box-shadow .12s ease; }\n  .ih-stat-card:hover { box-shadow: 0 4px 14px rgba(22,32,43,.1); }\n  .ih-stat-card:active { transform: scale(.97); }\n  .ih-msg-bubble { transition: filter .1s ease; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }\n  .ih-msg-bubble:active { filter: brightness(0.94); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width: 100%; min-height: 100vh; min-height: 100dvh; display: flex; justify-content: center; background: #e8ebef;\">\n<div style=\"width: 100%; max-width: 430px; height: 100vh; height: 100dvh; background: #ffffff; overflow: hidden; position: relative; display: flex; flex-direction: column;\">\n\n  <!-- status bar -->\n  <div style=\"height: 44px; flex: none; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; font-size: 13px; font-weight: 600; color: {{ statusColor }}; z-index: 6; background: {{ statusBg }};\">\n    <span>9:41<\u002Fspan>\n    <span style=\"display:flex;gap:6px;align-items:center;\">\n      <svg width=\"17\" height=\"12\" viewBox=\"0 0 17 12\" fill=\"{{ statusColor }}\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"5\" rx=\"1\"><\u002Frect><rect x=\"4.5\" y=\"4.5\" width=\"3\" height=\"7.5\" rx=\"1\"><\u002Frect><rect x=\"9\" y=\"2\" width=\"3\" height=\"10\" rx=\"1\"><\u002Frect><rect x=\"13.5\" y=\"0\" width=\"3\" height=\"12\" rx=\"1\"><\u002Frect><\u002Fsvg>\n      <svg width=\"24\" height=\"12\" viewBox=\"0 0 24 12\" fill=\"none\"><rect x=\"1\" y=\"1\" width=\"20\" height=\"10\" rx=\"3\" stroke=\"{{ statusColor }}\" stroke-opacity=\".5\"><\u002Frect><rect x=\"3\" y=\"3\" width=\"15\" height=\"6\" rx=\"1.5\" fill=\"{{ statusColor }}\"><\u002Frect><rect x=\"22\" y=\"4\" width=\"1.5\" height=\"4\" rx=\"1\" fill=\"{{ statusColor }}\"><\u002Frect><\u002Fsvg>\n    <\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"flex: 1; overflow-y: auto; overflow-x: hidden; position: relative;\">\n\n    <!-- ============ LOGIN ============ -->\n    <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:40px 30px 60px;animation:ih-screen .3s ease;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;margin-bottom:44px;\">\n        <div style=\"width:76px;height:76px;border-radius:22px;background:#366998;display:flex;align-items:center;justify-content:center;position:relative;\">\n          <svg width=\"38\" height=\"38\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12.5l5 5L20 6.5\"><\u002Fpath><\u002Fsvg>\n          <span style=\"position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#ff8500;border:3px solid #fff;\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:28px;margin-top:20px;color:#16202b;\">InstructHub<\u002Fdiv>\n        <div style=\"font-size:16px;color:#8494a3;margin-top:8px;text-align:center;line-height:1.5;\">Every instruction. Every task.<br>Accountable.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:14px;color:#8494a3;margin-bottom:7px;\">Email<\u002Fdiv>\n      <div style=\"border:1px solid #dbe1e8;border-radius:14px;padding:15px 16px;font-size:16px;color:#16202b;display:flex;align-items:center;gap:11px;\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8494a3\" stroke-width=\"2\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"3\"><\u002Frect><path d=\"M2 7l10 6 10 n      <div style=\"font-size:14px;color:#5c6b7a;line-height:1.6;margin-top:16px;text-align:left;\">This prototype is the exclusive property of Babajide Martins and is shared solely for review purposes with HR on Wheels. This link is valid until August 4, 2026. Unauthorised sharing, reproduction, or distribution of this prototype or its contents is strictly prohibited and may constitute a breach of the Non-Disclosure Agreement signed between both parties.<\u002Fdiv>\n      <div onclick=\"{{ toggleDisclaimerCheck }}\" style=\"display:flex;align-items:flex-start;gap:10px;margin-top:20px;cursor:pointer;\">\n        <div style=\"width:22px;height:22px;border-radius:6px;border:2px solid {{ disclaimerCheckBorder }};background:{{ disclaimerCheckBg }};display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px;\">\n          <sc-if value=\"{{ disclaimerAgreed }}\" hint-placeholder-val=\"{{ false }}\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#3a4756;line-height:1.5;\">I understand this is a confidential prototype and agree not to share or reproduce it.<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ agreeDisclaimer }}\" style=\"background:{{ disclaimerBtnBg }};color:#fff;border-radius:14px;padding:15px;text-align:center;font-size:16px;margin-top:20px;cursor:{{ disclaimerBtnCursor }};\">I Agree &amp; Continue<\u002Fdiv>\n      <div style=\"font-size:12px;color:#9aa5b1;font-style:italic;text-align:center;margin-top:16px;\">Protected under the Mutual NDA dated June 8, 2026.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 440, &quot;height&quot;: 876}}\">\nclass Component extends DCLogic {\n  state = { screen: 'login', tab: 'chats', detailTab: 'activity', projFilter: 'all', notifFilter: 'all',\n            openMsgIdx: null, openMMsgIdx: null, showCreate: false, showAdmin: false, prio: 'high', ctype: 'instruction',\n            mInboxFilter: 'all', mNotifFilter: 'all', mDetailTab: 'activity', mStatus: 'In Progress', role: null,\n            mQuickCreate: false, mChatTab: 'chats', mActTab: 'overview', showNoteEditor: false, showReminderEditor: false,\n            noteEditorText: '', showDisclaimer: true, disclaimerAgreed: false,\n            aActTab: 'overview', noteEditorTitle: '', editingNoteIdx: null,\n            reminderEditorTitle: '', reminderEditorTime: '',\n            mNotesData: [\n              { title: 'Legal clause follow-up', text: 'Ask Legal about clause 4.2 wording before sign-off', time: 'Added 8:10 AM' },\n              { title: 'Candidate follow-ups', text: 'Follow up with 3 candidates from Tuesday panel', time: 'Yesterday' },\n            ],\n            mRemindersData: [\n              { text: 'Submit onboarding review', time: 'Today · 4:00 PM' },\n              { text: '1:1 with Babajide', time: 'Thu · 11:00 AM' },\n            ],\n            aNotesData: [\n              { title: 'Follow up with Legal', text: 'Confirm sign-off timeline for the Q3 onboarding pack', time: 'Added 9:15 AM' },\n              { title: 'Payroll migration risk', text: 'Flag data migration timeline risk to David before Friday', time: 'Yesterday' },\n            ],\n            aRemindersData: [\n              { text: 'Review payroll system migration status', time: 'Today · 3:00 PM' },\n              { text: '1:1 with Sarah Mensah', time: 'Wed · 10:00 AM' },\n            ],\n            createTitle: '', createContext: '',\n\n            \u002F\u002F Fix 3: Workspace (Clients \u002F Departments)\n            workspaceTab: 'clients', workspaceLabel: 'Clients',\n            showWorkspaceLabelModal: false, workspaceLabelDraft: '',\n color: '#7a5cc4', name: 'David Okafor' }, members: 8, dueLabel: '5 days left', assigned: false,\n                groups: [\n                  { name: 'Finance — Budgeting Group', dueLabel: '5 days left', instr: 2, tasks: 5 },\n                  { name: 'Finance — Reconciliation Group', dueLabel: '2 days overdue', instr: 1, tasks: 2 },\n                ] },\n              { name: 'Operations', manager: { initials: 'KA', color: '#366998', name: 'Kwame Asante' }, members: 15, dueLabel: '6 days left', assigned: false,\n                groups: [\n                  { name: 'Operations — Fleet Group', dueLabel: '6 days left', instr: 3, tasks: 9 },\n                ] },\n              { name: 'Marketing', manager: { initials: 'SM', color: '#ff8500', name: 'Sarah Mensah' }, members: 6, dueLabel: '1 day left', assigned: false,\n                groups: [\n                  { name: 'Marketing — Campaigns Group', dueLabel: '1 day left', instr: 2, tasks: 4 },\n                ] },\n            ],\n\n            \u002F\u002F Fix 5: personal Tasks (private to-do list, separate per role)\n            ptasksFilter: 'all', showAddPTask: false,\n            newPTaskTitle: '', newPTaskDue: '', newPTaskPriority: 'high', newPTaskNotes: '',\n            aPersonalTasksData: [\n              { title: 'Renew HR software license', due: 'Today', bucket: 'today', priority: 'High', done: false },\n              { title: 'Book venue for town hall', due: 'Aug 1', bucket: 'upcoming', priority: 'Medium', done: false },\n              { title: 'Update employee handbook draft', due: 'Jul 20', bucket: 'upcoming', priority: 'Low', done: true },\n            ],\n            mPersonalTasksData: [\n              { title: 'Prep onboarding welcome kit', due: 'Today', bucket: 'today', priority: 'High', done: false },\n              { title: 'Read new HR policy doc', due: 'Jul 30', bucket: 'upcoming', priority: 'Medium', done: false },\n            ] };\n\n  go(screen) { this.setState({ screen, showCreate:false, showAdmin:false }); }\n  signIn(role) { this.setState({ role, screen: role==='admin' ? 'chats' : 'mchats', showCreate:false, showAdmin:false }); }\n  cycleStatus() { const order=['Pending','In Progress','Completed']; const i=order.indexOf(this.state.mStatus); this.setState({ mStatus: order[(i+1)%order.length] }); }\n\n  \u002F\u002F long-press (500ms) to reveal a message's context menu; tap\u002Fmove\u002Frelease-early cancels it\n  \u002F\u002F Touch input fires a synthetic \"ghost\" mousedown\u002Fmousemove\u002Fmouseup shortly\n  \u002F\u002F after the real touch events for legacy mouse-only site compatibility.\n  \u002F\u002F Without a guard, that ghost mousemove would cancel a touch-initiated long\n  \u002F\u002F press instantly. touchGuard() suppresses mouse-sourced press events for a\n  \u002F\u002F moment after a real touch so only the touch's own events drive the timer.\n  touchGuard() { this._touchGuardUntil = Date.now() + 600; }\n  isGhostMouse(isTouch) { return !isTouch && this._touchGuardUntil && Date.now() < this._touchGuardUntil; }\n  startPress(key, idx, isTouch) {\n    if (isTouch) this.touchGuard();\n    if (this.isGhostMouse(isTouch)) return;\n    this.cancelPress(isTouch);\n    this._pressMoved = false;\n    this._pressTimer = setTimeout(() => {\n      if (!this._pressMoved) this.setState({ [key]: idx });\n    }, 500);\n  }\n  cancelPress(isTouch) {\n    if (this.isGhostMouse(isTouch)) return;\n    if (this._pressTimer) { clearTimeout(this._pressTimer); this._pressTimer = null; }\n  }\n  movePress(isTouch) {\n    if (this.isGhostMouse(isTouch)) return;\n    this._pressMoved = true;\n    this.cancelPress(isTouch);\n  }\n\n  \u002F\u002F Multi-word touch event names (onTouchStart\u002FonTouchMove\u002FonTouchEnd) aren't\n  \u002F\u002F supported as template attributes by this runtime, so touch is wired via a\n  \u002F\u002F delegated document-level listener keyed off data-press-key\u002Fdata-press-idx\n  \u002F\u002F instead, set up once when the component mounts.\n  componentDidMount() {\n    this.__onTouchStart = (e) => this.__delegatePress(e, 'start');\n    this.__onTouchEnd = (e) => this.__delegatePress(e, 'end');\n    this.__onTouchMove = (e) => this.__delegatePress(e, 'move');\n    document.addEventListener('touchstart', this.__onTouchStart, { passive: true });\n    \u002F\u002F touchend is non-passive so we can suppress the browser's compatibility\n    \u002F\u002F click\u002Fmousedown\u002Fmouseup that normally follows a touch release — without\n    \u002F\u002F this, releasing a long press lands a \"ghost\" click on whatever menu\n    \u002F\u002F item the just-opened context menu happens to render under the finger.\n    document.addEventListener('touchend', this.__onTouchEnd, { passive: false });\n    document.addEventListener('touchmove', this.__onTouchMove, { passive: true });\n    \u002F\u002F Escape stands in for a hardware back-button press \u002F back-swipe gesture —\n    \u002F\u002F either should dismiss an open context menu rather than leaving the screen.\n    this.__onKeyDown = (e) => {\n      if (e.key === 'Escape' && (this.state.openMsgIdx !== null || this.state.openMMsgIdx !== null)) {\n        this.setState({ openMsgIdx: null, openMMsgIdx: null });\n      }\n    };\n    document.addEventListener('keydown', this.__onKeyDown);\n  }\n  componentWillUnmount() {\n    document.removeEventListener('touchstart', this.__onTouchStart);\n    document.removeEventListener('touchend', this.__onTouchEnd);\n    document.removeEventListener('touchmove', this.__onTouchMove);\n    document.removeEventListener('keydown', this.__onKeyDown);\n  }\n  __delegatePress(e, phase) {\n    const el = e.target.closest && e.target.closest('.ih-msg-bubble');\n    if (!el) return;\n    const key = el.getAttribute('data-press-key');\n    const idx = parseInt(el.getAttribute('data-press-idx'), 10);\n    if (phase === 'start') this.startPress(key, idx, true);\n    else if (phase === 'end') { e.preventDefault(); this.can
